<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizNis Apps - Application Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff2e5e;
            --secondary-color: #3b82f6;
            --dark-bg: #0f1729;
            --card-bg: #1a2141;
            --border-color: #2a3f5f;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .header {
            background-color: var(--dark-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 0;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-weight: 700;
            margin-bottom: 0;
            font-size: 1.8rem;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0;
        }

        .app-card {
            height: 100%;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            box-shadow: none;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .app-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(255, 46, 94, 0.1);
            transform: none;
        }

        .app-card-header {
            background-color: transparent;
            color: white;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .app-card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-light);
        }

        .app-category {
            display: inline-block;
            background-color: var(--secondary-color);
            color: white;
            padding: 0.35rem 0.85rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .card-body {
            padding: 1.5rem;
        }

        .app-description {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .app-link {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: 1px solid var(--primary-color);
        }

        .app-link:hover {
            background-color: transparent;
            color: var(--primary-color);
            text-decoration: none;
            border-color: var(--primary-color);
        }

        .filter-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .filter-section h5 {
            color: var(--text-light) !important;
        }

        .filter-btn {
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: transparent;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: var(--secondary-color);
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--secondary-color);
        }

        .filter-btn.active {
            background-color: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .no-results-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        footer {
            background-color: var(--card-bg) !important;
            border-top: 1px solid var(--border-color) !important;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="container">
            <h1>BizNis Apps</h1>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Filter Section -->
        <div class="filter-section">
            <h5 style="margin-bottom: 1rem; font-weight: 600;">Filter by Category</h5>
            <div id="filterButtons" class="d-flex flex-wrap">
                <button class="btn btn-sm filter-btn active" data-category="all">All Categories</button>
            </div>
        </div>

        <!-- Cards Grid -->
        <div id="cardsContainer" class="cards-grid">
            <p class="text-center"><span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Loading applications...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer style="padding: 2rem 0;">
        <div class="container">
            <p class="text-center mb-0">&copy; 2026 BizNis Apps. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allApps = [];
        let currentFilter = 'all';

        // Load JSON data
        async function loadApps() {
            try {
                const response = await fetch('apps.json');
                allApps = await response.json();
                
                // Extract unique categories
                const categories = [...new Set(allApps.map(app => app.category))];
                
                // Build filter buttons
                populateFilters(categories);
                
                // Display apps
                displayApps(allApps);
            } catch (error) {
                console.error('Error loading apps:', error);
                displayError();
            }
        }

        function populateFilters(categories) {
            const filterButtons = document.getElementById('filterButtons');
            const allBtn = filterButtons.querySelector('[data-category="all"]');
            
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-sm filter-btn';
                btn.textContent = category;
                btn.setAttribute('data-category', category);
                btn.addEventListener('click', () => filterApps(category));
                filterButtons.appendChild(btn);
            });
            
            allBtn.addEventListener('click', () => filterApps('all'));
        }

        function filterApps(category) {
            currentFilter = category;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-category="${category}"]`).classList.add('active');
            
            // Filter and display
            const filtered = category === 'all' ? allApps : allApps.filter(app => app.category === category);
            displayApps(filtered);
        }

        function displayApps(apps) {
            const container = document.getElementById('cardsContainer');
            
            if (apps.length === 0) {
                container.innerHTML = `
                    <div class="no-results" style="grid-column: 1 / -1;">
                        <div class="no-results-icon">📭</div>
                        <h4>No applications found</h4>
                        <p>Try adjusting your filters</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = apps.map(app => `
                <div class="card app-card">
                    <div class="app-card-header">
                        <h5 class="app-card-title">${escapeHtml(app.name)}</h5>
                        <span class="app-category">${escapeHtml(app.category)}</span>
                    </div>
                    <div class="card-body">
                        <p class="app-description">${escapeHtml(app.description)}</p>
                        <a href="${escapeHtml(app.link)}" class="app-link" target="_blank" rel="noopener noreferrer">
                            Open App →
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function displayError() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = `
                <div class="no-results" style="grid-column: 1 / -1;">
                    <div class="no-results-icon">⚠️</div>
                    <h4>Error loading applications</h4>
                    <p>Please check that apps.json file exists and is valid.</p>
                </div>
            `;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load apps on page load
        document.addEventListener('DOMContentLoaded', loadApps);
    </script>
</body>
</html>
